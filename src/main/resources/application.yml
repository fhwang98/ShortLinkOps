spring:
  application:
    name: shortlinkops

  datasource:
    url: "${SPRING_DATASOURCE_URL}"
    username: "${SPRING_DATASOURCE_USERNAME}"
    password: "${SPRING_DATASOURCE_PASSWORD}"
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.fhwang.shortlinkops.domain
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    redis:
      enabled: false
  info:
    env:
      enabled: true

info:
  app:
    name: shortlinkops
    description: ShortLinkOps URL shortener backend
    version: "${APP_VERSION:local}"
    java-version: "17"

shortlinkops:
  base-url: "${SHORTLINKOPS_BASE_URL:http://localhost:8080}"
