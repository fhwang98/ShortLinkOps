spring:
  datasource:
    url: "jdbc:h2:mem:shortlinkops;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1"
    username: sa
    password:
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.fhwang.shortlinkops.domain
  configuration:
    map-underscore-to-camel-case: true

server:
  forward-headers-strategy: framework

management:
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  health:
    redis:
      enabled: false

shortlinkops:
  base-url: "http://localhost:8080"
